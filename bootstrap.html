<html>
  <head>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
    />
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
      function tableOlusturma() {
        var projeAd = document.getElementById("Prg").value;
        var projeTrh = document.getElementById("trh").value;
        var aciklama = document.getElementById("açk").value;

        document.getElementById("demo").innerHTML +=
          "<tr><td>" +
          projeAd +
          "</td><td>" +
          projeTrh +
          "</td><td>" +
          aciklama +
          "</td></tr>";
      }
    </script>
  </head>
  <body>
    <div class="container">
      <form>
        <div class="form-group">
          <label for="Prg">Proje Adı:</label>
          <input type="text" class="form-control" id="Prg" />
        </div>
        <div class="form-group">
          <label for="trh">Yapıldığı tarihi:</label>
          <input type="text" class="form-control" id="trh" />
        </div>
        <div class="form-group">
          <label for="açk">Açıklama:</label>
          <input type="text" class="form-control" id="açk" />
        </div>
      </form>

      <button class="btn btn-danger" onclick="tableOlusturma()">KAYDET</button>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Proje Adı</th>
            <th>Yapıldığı Tarihi</th>
            <th>Açıklama</th>
          </tr>
        </thead>
        <tbody id="demo"></tbody>
      </table>
    </div>
  </body>
</html>
