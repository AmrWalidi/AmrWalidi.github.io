<html lang="tr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Page</title>
    <link rel="stylesheet" href="style.css" />
    <script src="code.js"></script>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <style>
      /* width */
      ::-webkit-scrollbar {
        width: 10px;
      }

      /* Track */
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      /* Handle */
      ::-webkit-scrollbar-thumb {
        background: #888;
      }

      /* Handle on hover */
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      .carousel-inner > .item > img,
      .carousel-inner > .item > a > img {
        width: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body class="body">
    <div id="navBox">
      <a style="right: 350px" href="#anasayfa">Anasayfa</a>
      <a style="right: 235px" href="#hakkimda">Hakkımda</a>
      <a style="right: 120px" href="#projeler">JS Projeler</a>
      <a style="right: 30px" href="#iletişim">İletişim</a>
    </div>
    <ul style="list-style-type: none; padding: 0; margin: 0">
      <li id="anasayfa">
        <div class="Front_Page container2">
          <iframe
            class="responsive-iframe"
            src="slider.html"
            scrolling="no"
            width="1200px"
            height="800px"
            style="margin-left: 150px; margin-top: 100px"
            frameborder="0"
          ></iframe>
        </div>
      </li>
      <li style="width: 100%; overflow: hidden" id="hakkimda ">
        <iframe
          width="100%"
          height="1500px"
          scrolling="no"
          src="hakkimda.html"
          frameborder="0"
        ></iframe>
      </li>
      <li id="projeler">
        <iframe
          width="100%"
          height="700px"
          scrolling="no"
          src="projeler.html"
          frameborder="0"
        ></iframe>
      </li>
      <li id="iletişim">
        <iframe
          width="100%"
          height="500px"
          scrolling="no"
          src="iletişim.html"
          style="margin-top: 200px"
          frameborder="0"
        ></iframe>
      </li>
      <li>
        <iframe
          width="100%"
          height="90px"
          src="footer.html"
          scrolling="no"
          frameborder="0"
        ></iframe>
      </li>
    </ul>
  </body>
</html>
